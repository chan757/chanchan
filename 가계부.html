<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #03c75a;
    --green-dark: #02a84b;
    --red: #ff4747;
    --blue: #1a73e8;
    --bg: #f5f6fa;
    --white: #ffffff;
    --gray1: #f9fafb;
    --gray2: #e9ecef;
    --gray3: #ced4da;
    --gray4: #868e96;
    --gray5: #495057;
    --dark: #212529;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #03c75a 0%, #02a84b 100%);
    color: #fff; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(3,199,90,.35);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
  header span { font-size: 0.85rem; opacity: .85; }

  /* ── Layout ── */
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
  @media(max-width:768px){ .wrap { grid-template-columns:1fr; } }

  /* ── Card ── */
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--gray2); display:flex; align-items:center; justify-content:space-between; }
  .card-header h2 { font-size: .95rem; font-weight: 700; }
  .card-body { padding: 20px; }

  /* ── Summary bar ── */
  .summary { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .sum-box { flex:1; min-width:120px; border-radius:10px; padding:14px 18px; background:var(--gray1); border:1px solid var(--gray2); }
  .sum-box label { font-size:.75rem; color:var(--gray4); display:block; margin-bottom:4px; }
  .sum-box .amount { font-size:1.15rem; font-weight:700; }
  .sum-box.income .amount { color: var(--green); }
  .sum-box.expense .amount { color: var(--red); }
  .sum-box.balance .amount { color: var(--blue); }

  /* ── Month nav ── */
  .month-nav { display:flex; align-items:center; gap:10px; }
  .month-nav button { background:none; border:1px solid var(--gray2); border-radius:6px; padding:4px 10px; cursor:pointer; font-size:.85rem; transition:.15s; }
  .month-nav button:hover { background:var(--gray2); }
  #monthLabel { font-size:1rem; font-weight:700; min-width:90px; text-align:center; }

  /* ── Form ── */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .form-row.triple { grid-template-columns:1fr 1fr 1fr; }
  .form-full { margin-bottom:10px; }
  label.fl { font-size:.78rem; color:var(--gray4); display:block; margin-bottom:4px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width:100%; border:1px solid var(--gray3); border-radius:8px;
    padding:9px 12px; font-size:.88rem; font-family:inherit;
    outline:none; transition:.15s;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(3,199,90,.15); }
  .type-toggle { display:flex; border:1px solid var(--gray2); border-radius:8px; overflow:hidden; }
  .type-toggle input { display:none; }
  .type-toggle label { flex:1; text-align:center; padding:9px 0; cursor:pointer; font-size:.85rem; font-weight:500; transition:.15s; color:var(--gray4); }
  .type-toggle input:checked + label.income-lbl { background:var(--green); color:#fff; }
  .type-toggle input:checked + label.expense-lbl { background:var(--red); color:#fff; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:8px; padding:10px 18px; font-size:.88rem; font-weight:600; cursor:pointer; transition:.15s; font-family:inherit; }
  .btn-green { background:var(--green); color:#fff; width:100%; margin-top:4px; }
  .btn-green:hover { background:var(--green-dark); }
  .btn-sm { padding:5px 11px; font-size:.78rem; border-radius:6px; }
  .btn-danger { background:#fff0f0; color:var(--red); border:1px solid #ffc9c9; }
  .btn-danger:hover { background:#ffe3e3; }

  /* ── Transaction list ── */
  .tx-list { list-style:none; }
  .tx-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--gray2); animation:fadeIn .25s ease; }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .tx-item:last-child { border-bottom:none; }
  .tx-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .tx-icon.income { background:#e8faf1; }
  .tx-icon.expense { background:#fff0f0; }
  .tx-info { flex:1; min-width:0; }
  .tx-info .tx-name { font-size:.9rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tx-info .tx-meta { font-size:.75rem; color:var(--gray4); margin-top:2px; }
  .tx-amount { font-weight:700; font-size:.95rem; flex-shrink:0; }
  .tx-amount.income { color:var(--green); }
  .tx-amount.expense { color:var(--red); }
  .tx-delete { background:none; border:none; cursor:pointer; color:var(--gray3); font-size:1rem; transition:.15s; }
  .tx-delete:hover { color:var(--red); }
  .empty { text-align:center; color:var(--gray4); font-size:.88rem; padding:30px 0; }

  /* ── Shopping memo ── */
  .memo-section { position:sticky; top:78px; display:flex; flex-direction:column; gap:16px; }
  .badge { display:inline-block; background:var(--red); color:#fff; border-radius:100px; font-size:.7rem; font-weight:700; padding:1px 7px; margin-left:6px; vertical-align:middle; }
  .memo-input-row { display:flex; gap:8px; margin-bottom:12px; }
  .memo-input-row input { flex:1; }
  .memo-input-row button { flex-shrink:0; }
  .memo-list { list-style:none; max-height:340px; overflow-y:auto; }
  .memo-item { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--gray2); animation:fadeIn .2s ease; }
  .memo-item:last-child { border-bottom:none; }
  .memo-check { width:18px; height:18px; accent-color:var(--green); cursor:pointer; flex-shrink:0; }
  .memo-text { flex:1; font-size:.88rem; }
  .memo-text.done { text-decoration:line-through; color:var(--gray3); }
  .memo-del { background:none; border:none; cursor:pointer; color:var(--gray3); font-size:.9rem; }
  .memo-del:hover { color:var(--red); }

  /* ── Category pills ── */
  .cat-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .cat-pill { padding:5px 12px; border-radius:100px; font-size:.75rem; font-weight:500; border:1px solid var(--gray2); background:var(--gray1); cursor:pointer; transition:.15s; }
  .cat-pill.active, .cat-pill:hover { background:var(--green); color:#fff; border-color:var(--green); }

  /* ── Day group ── */
  .day-group { margin-bottom:4px; }
  .day-header { display:flex; justify-content:space-between; align-items:center; font-size:.8rem; color:var(--gray4); font-weight:600; padding:10px 0 4px; border-bottom:1px dashed var(--gray2); margin-bottom:2px; }
  .day-header .day-sum { display:flex; gap:12px; }
  .day-header .day-sum span { font-weight:700; }
  .day-header .day-sum .i { color:var(--green); }
  .day-header .day-sum .e { color:var(--red); }

  /* scrollbar */
  .memo-list::-webkit-scrollbar { width:4px; }
  .memo-list::-webkit-scrollbar-track { background:transparent; }
  .memo-list::-webkit-scrollbar-thumb { background:var(--gray2); border-radius:4px; }
</style>
</head>
<body>

<header>
  <h1>💰 내 가계부</h1>
  <span id="todayStr"></span>
</header>

<div class="wrap">
  <!-- ── LEFT ── -->
  <div>
    <!-- Summary -->
    <div class="summary">
      <div class="sum-box income"><label>이번 달 수입</label><div class="amount" id="totalIncome">₩0</div></div>
      <div class="sum-box expense"><label>이번 달 지출</label><div class="amount" id="totalExpense">₩0</div></div>
      <div class="sum-box balance"><label>잔액</label><div class="amount" id="totalBalance">₩0</div></div>
    </div>

    <!-- Add Transaction -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><h2>✏️ 내역 추가</h2></div>
      <div class="card-body">
        <div class="form-row" style="margin-bottom:10px;">
          <div>
            <label class="fl">유형</label>
            <div class="type-toggle">
              <input type="radio" name="txType" id="typeIncome" value="income" checked>
              <label for="typeIncome" class="income-lbl">💚 수입</label>
              <input type="radio" name="txType" id="typeExpense" value="expense">
              <label for="typeExpense" class="expense-lbl">❤️ 지출</label>
            </div>
          </div>
          <div>
            <label class="fl">날짜</label>
            <input type="date" id="txDate">
          </div>
        </div>
        <div class="form-row triple">
          <div>
            <label class="fl">카테고리</label>
            <select id="txCat">
              <option value="식비">🍱 식비</option>
              <option value="교통">🚌 교통</option>
              <option value="쇼핑">🛍️ 쇼핑</option>
              <option value="문화">🎬 문화</option>
              <option value="의료">💊 의료</option>
              <option value="통신">📱 통신</option>
              <option value="급여" >💼 급여</option>
              <option value="용돈">💸 용돈</option>
              <option value="기타">📌 기타</option>
            </select>
          </div>
          <div>
            <label class="fl">금액 (원)</label>
            <input type="number" id="txAmount" placeholder="0" min="0">
          </div>
          <div>
            <label class="fl">내용</label>
            <input type="text" id="txDesc" placeholder="예) 편의점">
          </div>
        </div>
        <div class="form-full">
          <label class="fl">메모 (선택)</label>
          <input type="text" id="txNote" placeholder="추가 메모">
        </div>
        <button class="btn btn-green" onclick="addTx()">＋ 추가하기</button>
      </div>
    </div>

    <!-- Transaction List -->
    <div class="card">
      <div class="card-header">
        <h2>📋 거래 내역</h2>
        <div class="month-nav">
          <button onclick="changeMonth(-1)">◀</button>
          <span id="monthLabel"></span>
          <button onclick="changeMonth(1)">▶</button>
        </div>
      </div>
      <div class="card-body">
        <div class="cat-filter" id="catFilter"></div>
        <div id="txListWrap"></div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT ── -->
  <div class="memo-section">
    <!-- Shopping Memo -->
    <div class="card">
      <div class="card-header">
        <h2>🛒 구매 예정 메모 <span class="badge" id="memoBadge">0</span></h2>
      </div>
      <div class="card-body">
        <div class="memo-input-row">
          <input type="text" id="memoInput" placeholder="구매할 것 입력..." onkeydown="if(event.key==='Enter')addMemo()">
          <button class="btn btn-green btn-sm" onclick="addMemo()">추가</button>
        </div>
        <ul class="memo-list" id="memoList"></ul>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="card">
      <div class="card-header"><h2>📊 카테고리별 지출</h2></div>
      <div class="card-body" id="catStats"></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
let transactions = JSON.parse(localStorage.getItem('gb_tx') || '[]');
let memos        = JSON.parse(localStorage.getItem('gb_memo') || '[]');
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 0-indexed
let activeCat    = 'all';

const CATS = ['all','식비','교통','쇼핑','문화','의료','통신','급여','용돈','기타'];
const CAT_EMOJI = {식비:'🍱',교통:'🚌',쇼핑:'🛍️',문화:'🎬',의료:'💊',통신:'📱',급여:'💼',용돈:'💸',기타:'📌'};

// ── Init ──────────────────────────────────────────
(function init(){
  const today = new Date();
  document.getElementById('todayStr').textContent =
    today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('txDate').value = today.toISOString().split('T')[0];
  buildCatFilter();
  render();
  renderMemo();
})();

// ── Save ──────────────────────────────────────────
function save(){ localStorage.setItem('gb_tx', JSON.stringify(transactions)); }
function saveMemo(){ localStorage.setItem('gb_memo', JSON.stringify(memos)); }

// ── Month nav ──────────────────────────────────────
function changeMonth(d){
  currentMonth += d;
  if(currentMonth > 11){ currentMonth=0; currentYear++; }
  if(currentMonth < 0){ currentMonth=11; currentYear--; }
  render();
}

// ── Add Transaction ────────────────────────────────
function addTx(){
  const type   = document.querySelector('input[name=txType]:checked').value;
  const date   = document.getElementById('txDate').value;
  const cat    = document.getElementById('txCat').value;
  const amount = parseInt(document.getElementById('txAmount').value);
  const desc   = document.getElementById('txDesc').value.trim();
  const note   = document.getElementById('txNote').value.trim();
  if(!date || !amount || amount<=0 || !desc){ alert('날짜, 금액, 내용을 입력해주세요.'); return; }
  transactions.push({ id: Date.now(), type, date, cat, amount, desc, note });
  transactions.sort((a,b)=>b.date.localeCompare(a.date));
  save();
  document.getElementById('txAmount').value='';
  document.getElementById('txDesc').value='';
  document.getElementById('txNote').value='';
  render();
}

// ── Delete Transaction ─────────────────────────────
function deleteTx(id){
  if(!confirm('삭제할까요?')) return;
  transactions = transactions.filter(t=>t.id!==id);
  save(); render();
}

// ── Render ─────────────────────────────────────────
function render(){
  const label = `${currentYear}년 ${currentMonth+1}월`;
  document.getElementById('monthLabel').textContent = label;

  // Filter by month
  const monthly = transactions.filter(t=>{
    const d = new Date(t.date);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });

  // Summary
  const income  = monthly.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthly.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('totalIncome').textContent  = '₩'+income.toLocaleString();
  document.getElementById('totalExpense').textContent = '₩'+expense.toLocaleString();
  const bal = income-expense;
  const balEl = document.getElementById('totalBalance');
  balEl.textContent = (bal<0?'-':'')+'₩'+Math.abs(bal).toLocaleString();
  balEl.style.color = bal<0?'var(--red)':'var(--blue)';

  // Filter by cat
  const filtered = activeCat==='all' ? monthly : monthly.filter(t=>t.cat===activeCat);

  // Group by date
  const groups = {};
  filtered.forEach(t=>{ if(!groups[t.date])groups[t.date]=[]; groups[t.date].push(t); });
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  const wrap = document.getElementById('txListWrap');
  if(dates.length===0){ wrap.innerHTML='<div class="empty">📭 이번 달 내역이 없어요</div>'; }
  else {
    wrap.innerHTML = dates.map(date=>{
      const items = groups[date];
      const di = items.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const de = items.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      const dayLabel = new Date(date).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      return `<div class="day-group">
        <div class="day-header">
          <span>${dayLabel}</span>
          <div class="day-sum">
            ${di?`<span class="i">+${di.toLocaleString()}</span>`:''}
            ${de?`<span class="e">-${de.toLocaleString()}</span>`:''}
          </div>
        </div>
        <ul class="tx-list">
          ${items.map(t=>`
            <li class="tx-item">
              <div class="tx-icon ${t.type}">${CAT_EMOJI[t.cat]||'📌'}</div>
              <div class="tx-info">
                <div class="tx-name">${t.desc}</div>
                <div class="tx-meta">${t.cat}${t.note?' · '+t.note:''}</div>
              </div>
              <span class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${t.amount.toLocaleString()}원</span>
              <button class="tx-delete" onclick="deleteTx(${t.id})" title="삭제">✕</button>
            </li>`).join('')}
        </ul>
      </div>`;
    }).join('');
  }

  // Cat stats
  const catData = {};
  monthly.filter(t=>t.type==='expense').forEach(t=>{
    catData[t.cat] = (catData[t.cat]||0)+t.amount;
  });
  const catEl = document.getElementById('catStats');
  const sorted = Object.entries(catData).sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0){ catEl.innerHTML='<div class="empty">지출 내역이 없어요</div>'; }
  else {
    const max = sorted[0][1];
    catEl.innerHTML = sorted.map(([c,v])=>`
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px;">
          <span>${CAT_EMOJI[c]||'📌'} ${c}</span><span style="font-weight:700;color:var(--red)">-${v.toLocaleString()}원</span>
        </div>
        <div style="background:var(--gray2);border-radius:100px;height:6px;">
          <div style="background:var(--red);border-radius:100px;height:6px;width:${Math.round(v/max*100)}%;transition:.4s;"></div>
        </div>
      </div>`).join('');
  }
}

// ── Cat Filter ─────────────────────────────────────
function buildCatFilter(){
  const el = document.getElementById('catFilter');
  el.innerHTML = CATS.map(c=>`
    <span class="cat-pill ${c===activeCat?'active':''}" onclick="setCat('${c}')">
      ${c==='all'?'전체':(CAT_EMOJI[c]||'')+' '+c}
    </span>`).join('');
}
function setCat(c){ activeCat=c; buildCatFilter(); render(); }

// ── Memo ──────────────────────────────────────────
function addMemo(){
  const val = document.getElementById('memoInput').value.trim();
  if(!val) return;
  memos.push({ id:Date.now(), text:val, done:false });
  saveMemo(); renderMemo();
  document.getElementById('memoInput').value='';
}
function toggleMemo(id){
  const m = memos.find(m=>m.id===id);
  if(m){ m.done=!m.done; saveMemo(); renderMemo(); }
}
function deleteMemo(id){
  memos = memos.filter(m=>m.id!==id);
  saveMemo(); renderMemo();
}
function renderMemo(){
  const pending = memos.filter(m=>!m.done).length;
  document.getElementById('memoBadge').textContent = pending;
  document.getElementById('memoList').innerHTML = memos.length===0
    ? '<li style="text-align:center;color:var(--gray4);font-size:.85rem;padding:16px 0;">구매 목록이 비어있어요</li>'
    : memos.map(m=>`
        <li class="memo-item">
          <input type="checkbox" class="memo-check" ${m.done?'checked':''} onchange="toggleMemo(${m.id})">
          <span class="memo-text ${m.done?'done':''}">${m.text}</span>
          <button class="memo-del" onclick="deleteMemo(${m.id})">✕</button>
        </li>`).join('');
}
</script>
</body>
</html>
